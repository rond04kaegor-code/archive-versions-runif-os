        :root{--bg-page:#0f0e0a; --bg-panel:#1e1b15; --card-bg:#2a241cee; --text-main:#f0e6c5; --accent:#e67e22; --border-rust:#8b5a2b;}
        .video-poster{position:relative;cursor:pointer;display:inline-block;}
        .play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:white;text-shadow:0 0 5px black;pointer-events:none;}
